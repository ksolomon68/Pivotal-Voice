name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            echo "Pulling latest code (includes pre-built .next)..."
            git pull origin main
            echo "Installing production dependencies..."
            npm ci --omit=dev
            echo "Restarting app..."
            pm2 restart pivotal-voice --update-env 2>/dev/null || \
            pm2 start server.js --name pivotal-voice --env production 2>/dev/null || \
            echo "PM2 not available — restart via Hostinger hPanel"
            echo "Deploy complete!"
