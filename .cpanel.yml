---
deployment:
  tasks:
    # 1. Wipe old .next chunks so stale files never mix with new build
    - rm -rf /home/pivotalvoice/Pivotal-Voice/.next
    # 2. Sync everything (except secrets and node_modules) to the live folder
    - /bin/rsync -av --delete --exclude='.git' --exclude='node_modules' --exclude='.env.local' --exclude='.env' ./ /home/pivotalvoice/Pivotal-Voice/
    # 3. Install only production dependencies
    - . /home/pivotalvoice/nodevenv/Pivotal-Voice/24/bin/activate && cd /home/pivotalvoice/Pivotal-Voice && npm install --production
    # 4. Ensure tmp/ dir exists, then touch restart.txt to reload Passenger
    - mkdir -p /home/pivotalvoice/Pivotal-Voice/tmp && touch /home/pivotalvoice/Pivotal-Voice/tmp/restart.txt
